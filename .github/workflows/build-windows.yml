name: Build AIO-Graphics-Test (Windows PE)

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'cmake/**'
      - '.github/workflows/build-windows.yml'

jobs:
  build:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          # 64-bit: loads the container's x64 DXVK / VKD3D / ddraw DLL set.
          - arch: x86_64
            prefix: x86_64-w64-mingw32
            apt: gcc-mingw-w64-x86-64 g++-mingw-w64-x86-64
            out: AIO-Graphics-Test.exe
            artifact: windows-x86_64
          # 32-bit: loads the container's *x32* DXVK / VKD3D / ddraw DLL set -
          # the bitness almost every legacy DirectX (DX5/6/7/8/9) game runs as.
          - arch: i686
            prefix: i686-w64-mingw32
            apt: gcc-mingw-w64-i686 g++-mingw-w64-i686
            out: AIO-Graphics-Test-x86.exe
            artifact: windows-x86
    name: build-${{ matrix.arch }}
    steps:
      - uses: actions/checkout@v4

      - name: Install cross toolchain + shader compiler
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q \
            ${{ matrix.apt }} \
            glslang-tools cmake ninja-build git

      - name: Fetch Vulkan-Headers
        run: |
          git clone --depth 1 --branch sdk-1.3.239.0 \
            https://github.com/KhronosGroup/Vulkan-Headers.git vh
          cmake -S vh -B vh/build -DCMAKE_INSTALL_PREFIX=$PWD/vk
          cmake --install vh/build

      - name: Compile shaders to SPIR-V C headers
        run: |
          glslangValidator -V -x -o src/cube.vert.inc src/cube.vert
          glslangValidator -V -x -o src/cube.frag.inc src/cube.frag

      - name: Compile resources (app icon)
        run: ${{ matrix.prefix }}-windres -I src src/app.rc -o app_res.o

      - name: Compile objects
        run: |
          for f in cube gpuinfo menu bench hud cube_gl cube_d3d11 cube_d3d12 \
                   cube_d3d10 cube_d3d9 cube_d3d8 cube_ddraw watchdog; do
            ${{ matrix.prefix }}-gcc -c src/$f.c \
              -I src -I vk/include \
              -DVK_USE_PLATFORM_WIN32_KHR -DWIN32_LEAN_AND_MEAN \
              -D_WIN32_WINNT=0x0A00 \
              -O2 -o $f.o
          done

      - name: Build vulkan-1 import lib from the symbols actually referenced
        run: |
          # The real vulkan-1.dll is provided by Wine/DXVK at runtime; we only need
          # an import lib to link against. Derive the export list from the objects'
          # own undefined vk* references so the decoration matches exactly: on i686
          # those are __stdcall-decorated (vkCreateInstance@12), on x86_64 plain.
          # dlltool --kill-at then strips the @N from the DLL *import* name (the real
          # 32-bit vulkan-1.dll exports undecorated names) while keeping the decorated
          # symbol the linker resolves against. No-op effect on x86_64.
          mkdir -p vk/lib
          echo "EXPORTS" > vulkan-1.def
          ${{ matrix.prefix }}-nm *.o \
            | awk '/ U / {print $2}' \
            | sed 's/^_//' \
            | grep '^vk' \
            | sort -u >> vulkan-1.def
          echo "---- vulkan-1.def ($(($(wc -l < vulkan-1.def) - 1)) exports) ----"
          head -6 vulkan-1.def
          ${{ matrix.prefix }}-dlltool \
            --input-def vulkan-1.def \
            --dllname vulkan-1.dll \
            --output-lib vk/lib/libvulkan-1.a \
            --kill-at
          ls -l vk/lib/libvulkan-1.a

      - name: Link ${{ matrix.out }}
        run: |
          ${{ matrix.prefix }}-gcc \
            cube.o gpuinfo.o menu.o bench.o hud.o cube_gl.o cube_d3d11.o cube_d3d12.o \
            cube_d3d10.o cube_d3d9.o cube_d3d8.o cube_ddraw.o watchdog.o app_res.o \
            -mwindows \
            -L vk/lib \
            -o ${{ matrix.out }} \
            -lvulkan-1 -lgdi32 -luser32 -lopengl32 -lcomctl32 -ldxguid
          file ${{ matrix.out }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AIO-Graphics-Test-${{ matrix.artifact }}
          path: |
            ${{ matrix.out }}
            vk/bin/vulkan-1.dll
