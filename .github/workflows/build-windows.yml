name: Build AIO-Graphics-Test (Windows PE)

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'cmake/**'
      - '.github/workflows/build-windows.yml'

jobs:
  build:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          # 64-bit: loads the container's x64 DXVK / VKD3D / ddraw DLL set.
          - arch: x86_64
            prefix: x86_64-w64-mingw32
            apt: gcc-mingw-w64-x86-64 g++-mingw-w64-x86-64
            out: AIO-Graphics-Test.exe
            artifact: windows-x86_64
          # 32-bit: loads the container's *x32* DXVK / VKD3D / ddraw DLL set -
          # the bitness almost every legacy DirectX (DX5/6/7/8/9) game runs as.
          - arch: i686
            prefix: i686-w64-mingw32
            apt: gcc-mingw-w64-i686 g++-mingw-w64-i686
            out: AIO-Graphics-Test-x86.exe
            artifact: windows-x86
    name: build-${{ matrix.arch }}
    steps:
      - uses: actions/checkout@v4

      - name: Install cross toolchain + shader compiler
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q \
            ${{ matrix.apt }} \
            glslang-tools cmake ninja-build git

      - name: Fetch Vulkan-Headers
        run: |
          git clone --depth 1 --branch sdk-1.3.239.0 \
            https://github.com/KhronosGroup/Vulkan-Headers.git vh
          cmake -S vh -B vh/build -DCMAKE_INSTALL_PREFIX=$PWD/vk
          cmake --install vh/build

      - name: Generate vulkan-1 import lib (dlltool from .def)
        run: |
          # The real vulkan-1.dll is provided by Wine/DXVK at runtime in the container;
          # we only need an import lib to link against. Use the loader's published export
          # list (vulkan-1.def) -> libvulkan-1.a via mingw dlltool. No loader compile.
          mkdir -p vk/lib
          curl -sL -o vulkan-1.def \
            https://raw.githubusercontent.com/KhronosGroup/Vulkan-Loader/sdk-1.3.239.0/loader/vulkan-1.def
          head -3 vulkan-1.def; echo "... ($(wc -l < vulkan-1.def) lines)"
          ${{ matrix.prefix }}-dlltool \
            --input-def vulkan-1.def \
            --dllname vulkan-1.dll \
            --output-lib vk/lib/libvulkan-1.a
          ls -l vk/lib/libvulkan-1.a

      - name: Compile shaders to SPIR-V C headers
        run: |
          glslangValidator -V -x -o src/cube.vert.inc src/cube.vert
          glslangValidator -V -x -o src/cube.frag.inc src/cube.frag

      - name: Compile resources (app icon)
        run: ${{ matrix.prefix }}-windres -I src src/app.rc -o app_res.o

      - name: Cross-compile ${{ matrix.out }}
        run: |
          # --enable-stdcall-fixup: on 32-bit (i686) the Vulkan calls are __stdcall
          # so the compiler emits decorated refs (vkCreateInstance@12), but the
          # import lib generated from vulkan-1.def carries the undecorated names the
          # real 32-bit vulkan-1.dll exports. The fixup maps foo@N -> foo. No-op on
          # x86_64 (no stdcall decoration there).
          ${{ matrix.prefix }}-gcc src/cube.c src/gpuinfo.c src/menu.c src/bench.c src/hud.c src/cube_gl.c src/cube_d3d11.c src/cube_d3d12.c src/cube_d3d10.c src/cube_d3d9.c src/cube_d3d8.c src/cube_ddraw.c src/watchdog.c app_res.o \
            -I src -I vk/include \
            -DVK_USE_PLATFORM_WIN32_KHR -DWIN32_LEAN_AND_MEAN \
            -O2 -mwindows \
            -L vk/lib \
            -o ${{ matrix.out }} \
            -lvulkan-1 -lgdi32 -luser32 -lopengl32 -lcomctl32 -ldxguid \
            -Wl,--enable-stdcall-fixup
          file ${{ matrix.out }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AIO-Graphics-Test-${{ matrix.artifact }}
          path: |
            ${{ matrix.out }}
            vk/bin/vulkan-1.dll
